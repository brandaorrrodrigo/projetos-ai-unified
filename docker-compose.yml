    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ekids-chat:
    build:
      context: /d/E-Kids-PRO/server-chat
      dockerfile: Dockerfile
    container_name: ekids-chat
    restart: unless-stopped
    ports:
      - "3101:3001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/ekids
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      OLLAMA_BASE_URL: ${OLLAMA_INTERNAL_URL}
    depends_on:
      - ekids-main
    networks:
      - ai-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ========================================
  # 🚀 PROJETO 5: ENEM-IA
  # ========================================

  enem-backend:
    build:
      context: /d/enem-ia/enem-pro
      dockerfile: Dockerfile
    container_name: enem-backend
    restart: unless-stopped
    ports:
      - "8002:8000"
