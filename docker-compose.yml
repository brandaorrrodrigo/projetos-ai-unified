    ports:
      - "8003:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/juris_ia
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      OLLAMA_BASE_URL: ${OLLAMA_INTERNAL_URL}
      QDRANT_URL: ${QDRANT_INTERNAL_URL}
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ========================================
  # 🚀 PROJETO 4: E-KIDS PRO
  # ========================================

  ekids-main:
    build:
      context: /d/E-Kids-PRO
      dockerfile: Dockerfile
    container_name: ekids-main
    restart: unless-stopped
    ports:
      - "3100:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/ekids
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      OLLAMA_BASE_URL: ${OLLAMA_INTERNAL_URL}
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
