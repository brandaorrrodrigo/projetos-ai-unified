      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ========================================
  # 🚀 PROJETO 7: MEDICONTROL
  # ========================================

  medcontrol:
    build:
      context: /d/MEDCONTROL
      dockerfile: Dockerfile
    container_name: medcontrol
    restart: unless-stopped
    ports:
      - "3005:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/medcontrol
